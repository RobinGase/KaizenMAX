<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8" />
    <title>Kaizen MAX</title>
    <script>
      (function () {
        var debugFlag = /[?&]debug=?(1|true)?/i.test(window.location.search) ||
          window.localStorage.getItem("KAIZEN_DEBUG_BOOT") === "1";

        function noop() {}

        function ensureLogPane() {
          var pane = document.getElementById("__kaizen_boot_log");
          if (!pane) {
            pane = document.createElement("pre");
            pane.id = "__kaizen_boot_log";
            pane.style.position = "fixed";
            pane.style.left = "12px";
            pane.style.bottom = "12px";
            pane.style.maxWidth = "78vw";
            pane.style.maxHeight = "36vh";
            pane.style.overflow = "auto";
            pane.style.padding = "8px 10px";
            pane.style.margin = "0";
            pane.style.background = "rgba(25,25,25,0.92)";
            pane.style.color = "#f19999";
            pane.style.border = "1px solid #663333";
            pane.style.borderRadius = "6px";
            pane.style.font = "12px/1.4 ui-monospace, SFMono-Regular, Menlo, Consolas, monospace";
            pane.style.zIndex = "2147483647";
            pane.style.whiteSpace = "pre-wrap";
            pane.hidden = true;
            if (document.body) {
              document.body.appendChild(pane);
            } else {
              document.addEventListener("DOMContentLoaded", function () {
                if (!pane.isConnected && document.body) {
                  document.body.appendChild(pane);
                }
              });
            }
          }
          return pane;
        }

        function pushBootLog(msg) {
          if (!debugFlag) {
            return;
          }
          var pane = ensureLogPane();
          pane.hidden = false;
          var stamp = new Date().toISOString().split("T")[1].replace("Z", "");
          pane.textContent += "[" + stamp + "] " + msg + "\n";
        }

        window.__kaizenPushBootLog = debugFlag ? pushBootLog : noop;

        if (!debugFlag) {
          return;
        }

        var _origConsoleError = console.error;
        console.error = function () {
          var args = Array.prototype.slice.call(arguments);
          _origConsoleError.apply(console, args);
          pushBootLog("console.error: " + args.join(" "));
        };

        window.addEventListener("error", function (event) {
          pushBootLog(
            "window.error: " +
              (event.message || "unknown") +
              " @ " +
              (event.filename || "<inline>") +
              ":" +
              (event.lineno || 0)
          );
        });

        window.addEventListener("unhandledrejection", function (event) {
          var reason = event && event.reason ? event.reason.message || String(event.reason) : "unknown";
          pushBootLog("unhandledrejection: " + reason);
        });

        window.addEventListener("TrunkApplicationStarted", function () {
          pushBootLog("TrunkApplicationStarted event received.");
        });

        setTimeout(function () {
          if (!document.querySelector(".app-shell")) {
            pushBootLog("No .app-shell mounted after 4s.");
          }
        }, 4000);

        setTimeout(function () {
          var tauriOk =
            !!(window.__TAURI__ &&
              window.__TAURI__.core &&
              typeof window.__TAURI__.core.invoke === "function");
          if (!tauriOk) {
            pushBootLog("window.__TAURI__.core.invoke is not available after 2s.");
          }
        }, 2000);
      })();
    </script>
    <link data-trunk rel="rust" data-wasm-opt="z" />
    <link data-trunk rel="css" href="src/styles.css" />
  </head>
  <body></body>
</html>
